 <!DOCTYPE html>
<html>
<head>
    <title>Network Monitoring</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🚀 Cyber Network Monitoring Dashboard</h1>

<div class="card">
    <h2 id="traffic">Traffic: --</h2>
    <h2 id="status">Status: --</h2>
</div>

<canvas id="trafficChart"></canvas>
<h2 id="alertMsg"></h2>

<script>
let chart;

// 🔥 Fetch data every 3 seconds
function loadData() {
    fetch('/data')
    .then(res => res.json())
    .then(result => {

        document.getElementById("traffic").innerHTML = "Traffic: " + result.current_traffic;
        document.getElementById("status").innerHTML = "Status: " + result.status;

        // 🔥 Alert system
        if (result.alert) {
            document.getElementById("alertMsg").innerHTML = "⚠️ Suspicious Activity Detected";
            document.getElementById("alertMsg").style.color = "red";
        } else {
            document.getElementById("alertMsg").innerHTML = "✅ All Good";
            document.getElementById("alertMsg").style.color = "lightgreen";
        }

        // 🔥 Chart colors
        let colors = result.values.map(v => v > 80 ? 'red' : 'lightgreen');

        if (chart) chart.destroy();

        const ctx = document.getElementById('trafficChart').getContext('2d');

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: result.times,
                datasets: [{
                    label: 'Traffic',
                    data: result.values,
                    borderColor: 'white',
                    pointBackgroundColor: colors,
                    fill: false
                }]
            }
        });

    });
}

// 🔥 Auto refresh (no page reload)
setInterval(loadData, 3000);
loadData();

</script>

</body>
</html>
